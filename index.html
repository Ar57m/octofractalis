<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Another Fractal Generator</title>
        <style>
            h1 {
                text-align: center;
                background: linear-gradient(135deg, #ff00ea, #00fff2);
                font-size: 50px;
                font-weight: bold;
                background-clip: text;
                color: transparent;
            }

            body {
                background: linear-gradient(135deg, #121212, #3a3a3a);
                color: #fff;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                padding: 20px;
                box-sizing: border-box;
            }
            .container {
                background: #222;
                padding: 20px;
                border-radius: 20px;
                box-shadow: 0 0 15px rgba(0, 255, 242, 0.61);
                max-width: 1200px;
                width: 100%;
                margin: 20px;
                box-sizing: border-box;
            }
            .small-input {
                width: 25%;
            }
            .checkbox-text {
                display: flex;
                flex-direction: column;
            }
            input, select, button {
                width: 100%;
                margin: 8px 0;
                padding: 10px;
                background: #333;
                border: 1px solid #555;
                border-radius: 5px;
                color: #fff;
                box-sizing: border-box;
                transition: background 0.3s ease;
            }

            input:focus, select:focus, button:focus {
                border-color: #ff5100; /* Light blue border on focus */
                outline: none;         /* Removes the default browser outline */
            }
            
            button#generateFractal {
                background-color: #1abc9c;
                cursor: pointer;
                border: none;
            }
            
            button#generateFractal:hover {
                background-color: #158a72;
            }
            
            button#stop_button {
                background-color: #af1d1d;
                cursor: pointer;
                border: none;
            }
            
            button#stop_button:hover {
                background-color: #751414;
            }

            button.buttons:hover {
                background-color: #4d002a;
            }

            input[type="checkbox"] {
                width: 25px;
                height: 25px;
                margin-right: 5px;
                margin-bottom: 8px;
            }
            fieldset {
                border: 1px solid #555;
                border-radius: 10px;
                margin: 15px 0;
                padding: 15px;
                max-width: 100%;
                box-sizing: border-box;
            }

            .form-section {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: flex-start;
                align-items: center;
            }

            .form-section > div {
                display: flex;
                align-items: center;
                gap: 10px;
                flex: 1 1 auto;
                min-width: 200px;
            }

            .form-section label {
                flex: 1 1 25%;
                min-width: 30px;
            }


            input[type="text"],
            input[type="number"] {
                width: 35%;
                margin: 5px;
                box-sizing: border-box;

            }




            legend {
                font-size: 25px;
                font-weight: bold;
                color: #fff;
                padding: 0 10px;
                text-align: left;
            }

            label {
                display: inline-block;
                width: 150px;
                text-align: center;
                /* margin-bottom: 10px;
                padding-bottom: 10px; */
            }



            @media (max-width: 768px) {
                .container {
                    max-width: 100%;
                }
                input, select {
                    padding: 8px;
                }
                .form-section label {
                    flex: 1 1 100%;
                }
            }


            
            .fractalGallery {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 1%;
                border-radius: 2%;
                width: 100%;
                box-sizing: border-box;
            }
            .collapsible {
                border: 1px solid #555;
                border-radius: 10px;
                margin: 15px 0;
                padding: 10px;
            }

            .collapsible legend {
                cursor: pointer;
                padding: 0 10px;
                transition: color 0.3s ease;
            }

            .collapsible legend:hover {
                color: #1abc9c;
            }

            .collapsible legend::before {
                content: '▼';
                display: inline-block;
                margin-right: 8px;
                transition: transform 0.3s ease;
            }

            .collapsible.active legend::before {
                transform: rotate(-90deg);
            }

            .fractals-section {
                display: none;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
                padding: 15px 10px 0 10px;
            }

            .fractals-section label {
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
                padding: 5px;
                border-radius: 5px;
                transition: background 0.3s ease;
            }

            .fractals-section label:hover {
                background: rgba(255, 255, 255, 0.1);
            }
            .downloadButton {
                position: absolute;
                top: 5px;
                right: 10px;
                background-color: rgba(255, 255, 255, 0);
                border: none;
                cursor: pointer;
                font-size: 30px;
                z-index: 10;
            }
            #expression {
                font-size: 22px;
                width: 60%;
                max-width: 75%;
                min-width: 75%;
                margin: 0 auto;
                margin-bottom: 2%;
                margin-top: 2%;
                box-sizing: border-box;
            }
            #exp {
                font-weight: bold ;
                font-size: 25px;
                margin-top: 3%;
            }

            #palette {
                width: 100%;
            }
            #lake_palette {
                width: 100%;
            }

            .buttons {
                cursor: pointer;
            }


        </style>
    </head>
    <body>
        <div class="container">
            <h1>Another Fractal Generator</h1>
            <form id="fractalForm">
                <fieldset class="collapsible">
                    <legend onclick="toggleCollapse(this)">Select Fractals</legend>
                    <div class="fractals-section">
                        <fieldset>
                            <label><input type="checkbox" name="fractals[mandelbrot]" checked class="small-input"> Mandelbrot</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[juliaset]" class="small-input"> Julia Set</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[newton]" class="small-input"> Newton</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[newton_juliaset]" class="small-input"> Newton JuliaSet</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[magnet]" class="small-input"> Magnet Pendulum</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[lorenz]" class="small-input"> Lorenz Attractor</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[lyapunov]" class="small-input"> Lyapunov</label>
                        </fieldset>
                        <fieldset>
                            <label><input type="checkbox" name="fractals[sandpile]" class="small-input"> Sandpile</label>
                        </fieldset>
                    </div>
                </fieldset>


                <div class="form-section">


                    <br>
                    <label id="exp" for="expression">Expression or Equation</label>
                    <input type="text" id="expression" name="expression" value="z*z+c">
                    <br>    
                    <br>

                    <fieldset>
                        <legend>Main Parameters</legend>

                        <label for="gradient">Gradient:</label>
                        <input type="number" id="gradient" name="gradient" min="0" max="256" value="24" required class="small-input">
                        <br>

                        <label for="z_initial_r">Z Initial Real:</label>
                        <input type="text" id="z_initial_r" name="z_initial_r" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_i">Z Initial I:</label>
                        <input type="text" id="z_initial_i" name="z_initial_i" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_j">Z Initial J:</label>
                        <input type="text" id="z_initial_j" name="z_initial_j" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_k">Z Initial K:</label>
                        <input type="text" id="z_initial_k" name="z_initial_k" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_l">Z Initial L:</label>
                        <input type="text" id="z_initial_l" name="z_initial_l" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_m">Z Initial M:</label>
                        <input type="text" id="z_initial_m" name="z_initial_m" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_n">Z Initial N:</label>
                        <input type="text" id="z_initial_n" name="z_initial_n" value="0.0" required class="small-input">
                        <br>

                        <label for="z_initial_o">Z Initial O:</label>
                        <input type="text" id="z_initial_o" name="z_initial_o" value="0.0" required class="small-input">
                        <br>

                        <label for="newton_epsilon">Newton Epsilon:</label>
                        <input type="text" id="newton_epsilon" name="newton_epsilon" value="0.000001" required class="small-input" pattern="0\.[0-9]{1,7}">
                        <br>

                        <label for="n_points">Number of Magnets:</label>
                        <input type="number" id="n_points" name="n_points" min="2" max="10000" value="3" required class="small-input">
                        <br>

                        <label for="fast_mode">Fast Mode:</label>
                        <input type="checkbox" id="fast_mode" name="fast_mode" checked class="small-input">
                        <br>

                    </fieldset>
                        <br>

                    <fieldset>
                        <legend>General Parameters</legend>
                        <label for="width">Width:</label>
                        <input type="number" id="width" name="width" min="1" value="1024" required class="small-input">
                        <br>

                        <label for="height">Height:</label>
                        <input type="number" id="height" name="height" min="1" value="1024" required class="small-input">
                        <br>

                        <label for="max_iter">Max Iterations:</label>
                        <input type="number" id="max_iter" name="max_iter" min="2" value="400" required class="small-input">
                        <br>

                        <label for="top_colors">Top Colors:</label>
                        <input type="number" id="top_colors" name="top_colors" min="2" max="256" value="24" required class="small-input">
                        <br>

                        <label for="escape_radius">Escape Radius:</label>
                        <input type="text" id="escape_radius" name="escape_radius" value="0.0" required class="small-input">
                        <br>

                        <label for="array_size">Prime Array Size:</label>
                        <input type="number" id="array_size" name="array_size" min="1" max="16777216" value="1" required class="small-input">
                        <br>

                    </fieldset>
                        <br>
                        
                    <fieldset>
                        <label for="fractalize_image">Fractalize Image:</label>
                        <input type="file" id="fractalize_image" accept="image/*">
                    </fieldset>
                        <br>
                        
                    <fieldset>
                        <legend>Sandpile Parameter</legend>
                        <label for="max_grains">Max Grains:</label>
                        <input type="number" id="max_grains" name="max_grains" min="2" max="256" value="32" required class="small-input">
                        <br>
                    </fieldset>
                        <br>

                    <fieldset>
                        <legend>Julia Set Parameters</legend>
                        <label for="juliaset_c_real">C Real:</label>
                        <input type="text" id="juliaset_c_real" name="juliaset_c_real" value="-0.8" required class="small-input">
                        <br>

                        <label for="juliaset_c_imag">C Imaginary:</label>
                        <input type="text" id="juliaset_c_imag" name="juliaset_c_imag" value="0.16" required class="small-input">
                        <br>



                    </fieldset>
                        <br>

                    <fieldset>
                        <legend>Coordinates</legend>
                        <label for="xmin">X Min (float):</label>
                        <input type="text" id="xmin" name="xmin" value="-2.0" required class="small-input">
                        <br>

                        <label for="xmax">X Max (float):</label>
                        <input type="text" id="xmax" name="xmax" value="2.0" required class="small-input">
                        <br>

                        <label for="ymin">Y Min (float):</label>
                        <input type="text" id="ymin" name="ymin" value="-2.0" required class="small-input">
                        <br>

                        <label for="ymax">Y Max (float):</label>
                        <input type="text" id="ymax" name="ymax" value="2.0" required class="small-input">
                        <br>
                    </fieldset>
                        <br>


                    <fieldset>
                        <legend>Palette Settings</legend>
                        <label for="use_palette">Use Palette:</label>
                        <input type="checkbox" id="use_palette" name="use_palette" checked class="small-input">
                        <br>

                        <input type="text" 
                        id="palette" 
                        name="palette" 
                        value="./palettes/palette.png"
                        aria-label="Palette file path">
                        <br>
                        
                        <label for="shift_palette">Shift Colors:</label>
                        <input type="number" id="shift_palette" name="shift_palette" min="-1024" max="1024" value="0" required class="small-input">
                        <br>


                        <label for="lake">Use Lake:</label>
                        <input type="checkbox" id="lake" name="lake" checked class="small-input">
                        <br>

                        <input type="text" 
                        id="lake_palette" 
                        name="lake_palette" 
                        value="./palettes/lake_palette.png"
                        aria-label="Lake Palette file path">
                        <br>

                        <label for="shift_palette_lake">Shift Lake Colors:</label>
                        <input type="number" id="shift_palette_lake" name="shift_palette_lake" min="-1024" max="1024" value="0" required class="small-input">
                        <br>
                        <label for="quant_level">Quant Level:</label>
                        <input type="number" id="quant_level" name="quant_level" min="2" max="256" value="16" required class="small-input">
                        <br>
                            
                        <fieldset>
                            <legend>Random Palette</legend>
                            <label for="colorCount">Color Count:</label>
                            <input type="number" min="2" max="127" value="16" id="colorCount">
                            
                            
                            <select id="mode" aria-label="Color Mode">
                              <option value="solid">Solid Colors</option>
                              <option value="random">Full Random</option>
                            </select>
                            <br>
                            <button type="button" id="switch_palette" class="small-input buttons" onclick="switchPalette('palette')" aria-label="Switch to Rainbow Palette">🌈</button>
                            <button type="button" id="switch_lake_palette" class="small-input buttons" onclick="switchPalette('lake_palette')" aria-label="Switch to Lake Palette">🏞️</button>
                            <br> 
                            <button type="button" id="generatePalette" class="buttons" onclick="generateRandomPalette()" aria-label="Generate Random Palette">Generate</button>
                            <br>
                            <img id="result" alt="Generated color palette will appear here.">
                            <br>
                        </fieldset>
                    </fieldset>
                        <br>

                    <fieldset>
                        <legend>Lorenz Parameters</legend>
                        <label for="sigma">Sigma:</label>
                        <input type="text" id="sigma" name="sigma" value="10.0" required class="small-input">
                        <br>
                        <label for="rho">Rho:</label>
                        <input type="text" id="rho" name="rho" value="28.0" required class="small-input">
                        <br>
                        <label for="beta">Beta:</label>
                        <input type="text" id="beta" name="beta" value="2.66666666" required class="small-input">
                        <br>
                        <label for="dt">Dt:</label>
                        <input type="text" id="dt" name="dt" value="0.01" required class="small-input">
                        <br>
                        <label for="rotation_angle">Rotation Angle:</label>
                        <input type="text" id="rotation_angle" name="rotation_angle" value="0.0" required class="small-input">
                        <br>
                        <label for="axis">Axis:</label>
                        <input type="number" id="axis" name="axis" min="-1" max="5" value="-1" required class="small-input">
                        <br>
                        <label for="max_point_size">Max Point Size:</label>
                        <input type="number" id="max_point_size" name="max_point_size" min="1" max="256" value="1" required class="small-input">
                        <br>
                    </fieldset>
                        <br>

                    <fieldset>
                        <legend>Zoom</legend>
                        <label for="continue_aim">Zoom or Reset:</label>
                        <input type="checkbox" id="continue_aim" name="continue_aim" class="small-input">
                        <br>

                        <label for="column_aim">Column:</label>
                        <input type="number" id="column_aim" name="column_aim" min="1" max="11" value="1" required class="small-input">
                        <br>

                        <label for="row_aim">Row:</label>
                        <input type="number" id="row_aim" name="row_aim" min="1" max="11" value="1" required class="small-input">
                        <br>

                        <label for="grid_length">Grid Length:</label>
                        <input type="number" id="grid_length" name="grid_length" min="1" max="11" value="1" required class="small-input">
                        <br>
                    </fieldset>
                        <br>

                </div>
                <button type="button" id="generateFractal">Generate Fractal</button>
                <button type="button" id="stop_button" value="Stop">Stop</button>
                
            </form>

            <fieldset>
                <div id="fractalContainer" class="fractalGallery"></div>
            </fieldset>
        </div>

    <script>


        function validateInput(elementId, min, max, n_default) {
            const inputElement = document.getElementById(elementId);
            inputElement.addEventListener("input", function() {
                const value = parseFloat(this.value);
                if (value < min || value > max) {
                    alert(`Please enter a value between ${min} and ${max}`);
                    this.value = n_default.toString();
                }
            });
        }

        validateInput("escape_radius", 0.0, 1000000000.0, 0.0);
        validateInput("newton_epsilon", 0.0000001, 1.0, 0.000001);
        validateInput("juliaset_c_real", -100.0, 100.0, -0.8);
        validateInput("juliaset_c_imag", -100.0, 100.0, 0.16);
        validateInput("sigma", -10000.0, 10000.0, 10.0);
        validateInput("rho", -10000.0, 10000.0, 28.0);
        validateInput("beta", -10000.0, 10000.0, 2.666666666);
        validateInput("dt", -1000.0, 1000.0, 0.01);
        validateInput("z_initial_r", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_i", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_j", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_k", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_l", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_m", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_n", -10000.0, 10000.0, 0.0);
        validateInput("z_initial_o", -10000.0, 10000.0, 0.0);
        validateInput("xmin", -10000.0, 10000.0, -2.0);
        validateInput("xmax", -10000.0, 10000.0, 2.0);
        validateInput("ymin", -10000.0, 10000.0, -2.0);
        validateInput("ymax", -10000.0, 10000.0, 2.0);
        validateInput("rotation_angle", -10000.0, 10000.0, 0.0);
        
        
        
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        let tabId = sessionStorage.getItem('tabId');
        if (!tabId) {
        tabId = generateUUID();
        sessionStorage.setItem('tabId', tabId);
        }


        function toggleCollapse(legend) {
            const fieldset = legend.parentElement;
            const content = fieldset.querySelector('.fractals-section');
            const isActive = fieldset.classList.toggle('active');
            
            content.style.display = isActive ? 'grid' : 'none';
        }


        // Verify if parenthese/brackets match
        function isBalanced(str) {
            let stack = [];
            for (let char of str) {
                if (char === "(" || char === "[") stack.push(char);
                else if (char === ")" || char === "]") {
                    if (!stack.length) return false;
                    let last = stack.pop();
                    if ((char === ")" && last !== "(") || (char === "]" && last !== "[")) return false;
                }
            }
            return stack.length === 0;
        }

        document.getElementById("expression").addEventListener("input", function () {
            const expr = this.value;
            if (!isBalanced(expr)) {
                this.setCustomValidity("Mismatched parentheses or brackets.");
            } else {
                this.setCustomValidity("");
            }
        });

        
        const expressionInput = document.getElementById("expression");
        // Trigger actions for Enter and Spacebar
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent default form submission
                document.getElementById('generateFractal').click(); // Simulate Generate button click
            }
            if (event.key === 'End' && document.activeElement.tagName !== 'INPUT') { // Spacebar detection
                event.preventDefault(); // Prevent scrolling when Space is pressed
                document.getElementById('stop_button').click(); // Simulate Stop button click
            }
        });



        document.getElementById("grid_length").addEventListener("input",function() {
            let gridValue = this.value;
            if (gridValue > 0) {
                column_aim.max = gridValue;
                row_aim.max = gridValue;                
            }

        });


        // For the random palette generator
        const elements = {
          colorCount: document.getElementById('colorCount'),
          mode: document.getElementById('mode'),
          result: document.getElementById('result')
        };
        
        // Create canvas once
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const SIZE = 256;
        canvas.width = canvas.height = SIZE;
        
        
        function generateRandomPalette() {
          const nn = parseInt(elements.colorCount.value);
          const n = Math.max(2, (nn > 127 ? 2 : nn));
          const isSolid = elements.mode.value === 'solid';
          
          const gridSize = Math.ceil(Math.sqrt(n));
          const cellSize = SIZE / gridSize; // Keep as float for accurate positioning
          
          const colors = Array.from({length: n}, () => {
            const h = Math.random() * 360;
            const s = isSolid ? 100 : Math.random() * 100;
            const l = isSolid ? 50 : Math.random() * 100;
            return `hsl(${h},${s}%,${l}%)`;
          });
        
          ctx.clearRect(0, 0, SIZE, SIZE);
          
          for(let y = 0; y < gridSize; y++) {
            for(let x = 0; x < gridSize; x++) {
              // Calculate integer positions and dimensions
              const xPos = Math.floor(x * cellSize);
              const yPos = Math.floor(y * cellSize);
              const nextXPos = Math.floor((x + 1) * cellSize);
              const nextYPos = Math.floor((y + 1) * cellSize);
              const width = nextXPos - xPos;
              const height = nextYPos - yPos;
              
              ctx.fillStyle = colors[(y * gridSize + x) % n];
              ctx.fillRect(xPos, yPos, width, height);
            }
          }
        
          elements.result.src = canvas.toDataURL();
        }
        
        function switchPalette(nameVar) {
            var paletteInput = document.getElementById(nameVar);
            
            if (elements && elements.result && elements.result.src) {
                paletteInput.value = elements.result.src;
            }
        }

        
        
        
        
        function resizeImage(imagePath, maxPixels, callback) {
            const img = new Image();
            img.src = imagePath;

            img.onload = function () {
                const originalPixels = img.width * img.height;

                if (originalPixels > maxPixels) {
                    const { canvas, ctx } = createCanvas();
                    const scale = Math.sqrt(maxPixels / originalPixels);

                    resizeAndDrawImage(img, scale, canvas, ctx);
                    callback(canvas.toDataURL());
                } else {
                    callback(imagePath);
                }
            };
        }

        // Shared helper function to create a canvas
        function createCanvas() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            return { canvas, ctx };
        }

        // Shared helper function to resize and draw the image
        function resizeAndDrawImage(img, scale, canvas, ctx) {
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        const maxDimension = 2048; // Maximum width or height
        var fractalizeImageBlob = false;

        // Processing and setting the image to fractalize
        document.getElementById('fractalize_image').addEventListener('change', async function (event) {
            const file = event.target.files[0];
            if (!file) {
                console.log("No file selected.");
                fractalizeImageBlob = false;
                return;
            }

            const reader = new FileReader();

            reader.onload = function (e) {
                const img = new Image();

                img.onload = function () {
                    let width = img.width;
                    let height = img.height;

                    // Scale the image if it exceeds the maxDimension
                    let scale = 1;
                    if (width > maxDimension || height > maxDimension) {
                        scale = Math.min(maxDimension / width, maxDimension / height);
                    }

                    const { canvas, ctx } = createCanvas();
                    resizeAndDrawImage(img, scale, canvas, ctx);

                    // Convert to Base64
                    const base64Image = canvas.toDataURL('image/png');

                    // Store in a variable
                    fractalizeImageBlob = base64Image;
                    console.log("Image Loaded");
                };

                img.src = e.target.result;
            };

            reader.readAsDataURL(file);
        });

        // To see the grid to help zoom
        function drawGridOnImage(imageSrc, n, callback) {
            const canvas = document.createElement('canvas');
            canvas.classList.add('fractalCanvas');
            const ctx = canvas.getContext('2d');

            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.src = imageSrc;

            img.onload = function () {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0, img.width, img.height);

                const cellWidth = img.width / n;
                const cellHeight = img.height / n;

                ctx.strokeStyle = 'black';
                ctx.lineWidth = 1;

                for (let i = 1; i < n; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * cellWidth, 0);
                    ctx.lineTo(i * cellWidth, img.height);
                    ctx.stroke();
                }

                for (let j = 1; j < n; j++) {
                    ctx.beginPath();
                    ctx.moveTo(0, j * cellHeight);
                    ctx.lineTo(img.width, j * cellHeight);
                    ctx.stroke();
                }

                callback(canvas.toDataURL());
            };
        }
        
        // Sending the form data to the python side
        document.getElementById('generateFractal').addEventListener('click', function() {
            const form = document.getElementById('fractalForm');
            

            // Check if the form is valid
            if (!form.checkValidity()) {
                form.reportValidity();
                return
            }

            const formData = new FormData(form);
            const maxPixels = 1048576; // 1MP
            const url = `${window.location.protocol}//${window.location.hostname}:${window.location.port}`;
            
            

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=utf-8'
                },
                body: JSON.stringify({
                    width: formData.get('width'),
                    height: formData.get('height'),
                    max_iter: formData.get('max_iter'),
                    escape_radius: formData.get('escape_radius'),
                    top_colors: formData.get('top_colors'),
                    max_grains: formData.get('max_grains'),
                    juliaset_c_real: formData.get('juliaset_c_real'),
                    juliaset_c_imag: formData.get('juliaset_c_imag'),
                    xmin: formData.get('xmin'),
                    xmax: formData.get('xmax'),
                    ymin: formData.get('ymin'),
                    ymax: formData.get('ymax'),
                    palette: formData.get('palette'),
                    lake_palette: formData.get('lake_palette'),
                    expression: formData.get('expression'),
                    fractals: {
                        mandelbrot: formData.get('fractals[mandelbrot]') === 'on',
                        juliaset: formData.get('fractals[juliaset]') === 'on',
                        newton: formData.get('fractals[newton]') === 'on',
                        newton_juliaset: formData.get('fractals[newton_juliaset]') === 'on',
                        magnet: formData.get('fractals[magnet]') === 'on',
                        lorenz: formData.get('fractals[lorenz]') === 'on',
                        lyapunov: formData.get('fractals[lyapunov]') === 'on',
                        sandpile: formData.get('fractals[sandpile]') === 'on'
                    },
                    use_palette: formData.get('use_palette') === 'on',
                    gradient: formData.get('gradient'),
                    lake: formData.get('lake') === 'on',
                    shift_palette: formData.get('shift_palette'),
                    shift_palette_lake: formData.get('shift_palette_lake'),
                    levels: formData.get('quant_level'),
                    column_aim: formData.get('column_aim'),
                    row_aim: formData.get('row_aim'),
                    grid_length: formData.get('grid_length'),
                    continue_aim: formData.get('continue_aim') === 'on',
                    z_initial_r: formData.get('z_initial_r'),
                    z_initial_i: formData.get('z_initial_i'),
                    z_initial_j: formData.get('z_initial_j'),
                    z_initial_k: formData.get('z_initial_k'),
                    z_initial_l: formData.get('z_initial_l'),
                    z_initial_m: formData.get('z_initial_m'),
                    z_initial_n: formData.get('z_initial_n'),
                    z_initial_o: formData.get('z_initial_o'),
                    newton_epsilon: formData.get('newton_epsilon'),
                    sigma: formData.get('sigma'),
                    rho: formData.get('rho'),
                    beta: formData.get('beta'),
                    dt: formData.get('dt'),
                    rotation_angle: formData.get('rotation_angle'),
                    axis: formData.get('axis'),
                    max_point_size: formData.get('max_point_size'),
                    n_points: formData.get('n_points'),
                    array_size: formData.get('array_size'),
                    fractalize_image: fractalizeImageBlob,
                    fast_mode: formData.get('fast_mode') === 'on',
                    tab_id: tabId,
                    
                    // zoom: formData.get('zoom') === 'on',
                    // max_zoom: formData.get('max_zoom')
                })
            })
            .then(response => response.text())
            .then(fractalResult => {
                const imagePaths = fractalResult.split(',');

                const fractalContainer = document.getElementById('fractalContainer');
                const gridLengthInput = document.getElementById('grid_length');
                fractalContainer.innerHTML = '';

                const gridLengthInputN = parseInt(gridLengthInput.value);

                imagePaths.forEach(imagePath => {
                    resizeImage(imagePath, maxPixels, function(rescaledImageSrc) {
                        if (gridLengthInputN > 1) {
                            drawGridOnImage(rescaledImageSrc, gridLengthInputN, function(finalImageSrc) {

                                const imgWrapper = document.createElement('div');
                                imgWrapper.classList.add('fractalGallery');

                                const imgElement = document.createElement('img');
                                imgElement.src = finalImageSrc;
                                imgElement.style.width = '100%';
                                imgWrapper.appendChild(imgElement);

                                const downloadButton = document.createElement('a');
                                downloadButton.href = imagePath;
                                downloadButton.download = 'fractal_image.png';
                                downloadButton.classList.add('downloadButton');
                                downloadButton.innerHTML = '⬇️';
                                imgWrapper.appendChild(downloadButton);

                                fractalContainer.appendChild(imgWrapper);
                            });
                        } else {
                            const imgWrapper = document.createElement('div');
                            imgWrapper.classList.add('fractalGallery');

                            const imgElement = document.createElement('img');
                            imgElement.src = rescaledImageSrc;
                            imgElement.style.width = '100%';
                            imgWrapper.appendChild(imgElement);

                            const downloadButton = document.createElement('a');
                            downloadButton.href = imagePath;
                            downloadButton.download = 'fractal_image.png';
                            downloadButton.classList.add('downloadButton');
                            downloadButton.innerHTML = '⬇️';
                            imgWrapper.appendChild(downloadButton);

                            fractalContainer.appendChild(imgWrapper);
                        }
                    });
                });
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });


        // Now its working :) the button which stops the fractal generation for who started the generation
        document.getElementById("stop_button").addEventListener("click", function() {
            const tabId = sessionStorage.getItem('tabId');
            fetch('/stop', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json; charset=utf-8'
                },
                body: JSON.stringify({ action: 'stop', tabId: tabId }) // Send tabId
            })
            .then(response => response.json())
            .then(data => {
                console.log(data.message);
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });

        
    </script>
    </body>
